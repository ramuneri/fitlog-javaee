<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>FitLog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css" />
</h:head>
<h:body>
    <h1>FitLog</h1>
    <p><strong>Workout tracking system</strong></p>

    <p>Welcome to FitLog. Choose a page to manage your workout data.</p>

    <nav>
        <p><h:link outcome="workoutPlans" value="Workout Plans" /></p>
        <p><h:link outcome="exercises" value="Exercises" /></p>
        <p><h:link outcome="muscleGroups" value="Muscle Groups" /></p>

        <p><h:link outcome="asyncDemo" value="Async Demo" /></p>
    </nav>

    <hr/>

    <p>Homepage visits count: #{homePage.visitCount}</p>
    <p>Counter instance ID: #{homePage.counterInstanceId}</p>

    <h:form>
        <h:commandButton value="Count visit" action="#{homePage.countVisit}" />
    </h:form>

</h:body>
</html>
