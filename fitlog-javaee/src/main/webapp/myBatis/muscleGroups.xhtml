<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Muscle Groups MyBatis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css" />
</h:head>
<h:body>
    <h1>Muscle Groups (MyBatis)</h1>

    <p><h:link outcome="/index" value="Back to Home" /></p>
    <p><h:link outcome="/myBatis/workoutPlans" value="Go to Workout Plans page" /></p>
    <p><h:link outcome="/myBatis/exercises" value="Go to Exercises page" /></p>

    <h:messages style="color: red;" />

    <h3>Add Muscle Group</h3>
    <h:form>
        <p>
            Name:
            <h:inputText value="#{muscleGroupsMyBatis.muscleGroupToCreate.name}" />
        </p>
        <h:commandButton value="Add" action="#{muscleGroupsMyBatis.createMuscleGroup}" />
    </h:form>

    <hr/>

    <h3>Muscle Groups</h3>
    <h:panelGroup rendered="#{empty muscleGroupsMyBatis.allMuscleGroups}">
        <p>No muscle groups yet.</p>
    </h:panelGroup>

    <ui:repeat value="#{muscleGroupsMyBatis.allMuscleGroups}" var="mg">
        <p>
            ID: #{mg.id} | #{mg.name}
        </p>
    </ui:repeat>
</h:body>
</html>
