<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Workout Plans MyBatis</title>
</h:head>
<h:body>
    <h1>Workout Plans (MyBatis)</h1>

    <p><h:link outcome="/index" value="Back to Home" /></p>
    <p><h:link outcome="/myBatis/exercises" value="Go to Exercises page" /></p>
    <p><h:link outcome="/myBatis/muscleGroups" value="Go to Muscle Groups page" /></p>

    <h:messages style="color: red;" />

    <h3>Add Workout Plan</h3>
    <h:form>
        <p>
            Name:
            <h:inputText value="#{workoutPlansMyBatis.workoutPlanToCreate.name}" />
        </p>
        <p>
            Difficulty:
            <h:inputText value="#{workoutPlansMyBatis.workoutPlanToCreate.difficulty}" />
        </p>
        <h:commandButton value="Add" action="#{workoutPlansMyBatis.createWorkoutPlan}" />
    </h:form>

    <hr/>

    <h3>Workout Plans</h3>
    <h:panelGroup rendered="#{empty workoutPlansMyBatis.allWorkoutPlans}">
        <p>No workout plans yet.</p>
    </h:panelGroup>

    <ui:repeat value="#{workoutPlansMyBatis.allWorkoutPlans}" var="plan">
        <p>
            ID: #{plan.id} | #{plan.name} - #{plan.difficulty}
        </p>
    </ui:repeat>
</h:body>
</html>
