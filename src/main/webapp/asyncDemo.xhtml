<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>Async Demo</title>
    <meta http-equiv="refresh" content="1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css" />
</h:head>
<h:body>
    <h1>Asynchronous Communication Demo</h1>

    <p><h:link outcome="index" value="Back to Home" /></p>

    <h:form>
        <h:commandButton value="Start async calculation"
                         action="#{asyncDemo.startCalculation}" />
    </h:form>

    <h:panelGroup>
        <p>Status: #{asyncDemo.asyncProgress.message}</p>
        <p>Progress: #{asyncDemo.asyncProgress.progress}%</p>
    </h:panelGroup>

</h:body>
</html>
