<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Muscle Groups</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css" />
</h:head>
<h:body>
    <h1>Muscle Groups</h1>

    <p><h:link outcome="index" value="Back to Home" /></p>
    <p><h:link outcome="workoutPlans" value="Workout Plans" /></p>
    <p><h:link outcome="exercises" value="Exercises" /></p>

    <h:messages style="color: red;" />

    <section>
        <h2>Add New Muscle Group</h2>
        <h:form>
            <p>
                <label>Name</label><br/>
                <h:inputText value="#{muscleGroups.muscleGroupToCreate.name}" />
            </p>
            <h:commandButton value="Save Muscle Group" action="#{muscleGroups.createMuscleGroup}" />
        </h:form>
    </section>

    <hr/>

    <section>
        <h2>Muscle Group List</h2>

        <h:panelGroup rendered="#{empty muscleGroups.allMuscleGroups}">
            <p>No muscle groups found.</p>
        </h:panelGroup>

        <ui:repeat value="#{muscleGroups.allMuscleGroups}" var="muscleGroup">
            <p>
                <strong>ID:</strong> #{muscleGroup.id} |
                <strong>Name:</strong> #{muscleGroup.name}
            </p>
        </ui:repeat>
    </section>
</h:body>
</html>
