<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Workout Plans</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css" />
</h:head>
<h:body>
    <h1>Workout Plans</h1>

    <p><h:link outcome="index" value="Back to Home" /></p>
    <p><h:link outcome="exercises" value="Exercises" /></p>
    <p><h:link outcome="muscleGroups" value="Muscle Groups" /></p>

    <h:messages style="color: red;" />

    <section>
        <h2>Add New Workout Plan</h2>
        <h:form>
            <p>
                <label>Name</label><br/>
                <h:inputText value="#{workoutPlans.workoutPlanToCreate.name}" />
            </p>
            <p>
                <label>Difficulty</label><br/>
                <h:inputText value="#{workoutPlans.workoutPlanToCreate.difficulty}" />
            </p>
            <h:commandButton value="Save Workout Plan" action="#{workoutPlans.createWorkoutPlan}" />
        </h:form>
    </section>

    <hr/>

    <section>
        <h2>Workout Plan List</h2>

        <h:panelGroup rendered="#{empty workoutPlans.allWorkoutPlans}">
            <p>No workout plans found.</p>
        </h:panelGroup>

        <ui:repeat value="#{workoutPlans.allWorkoutPlans}" var="plan">
            <article>
                <p>
                    <strong>ID:</strong> #{plan.id}<br/>
                    <strong>Name:</strong> #{plan.name}<br/>
                    <strong>Difficulty:</strong> #{plan.difficulty}
                </p>

                <p><strong>Exercises:</strong></p>

                <h:panelGroup rendered="#{empty plan.exercises}">
                    <p>No exercises assigned yet.</p>
                </h:panelGroup>

                <ui:repeat value="#{plan.exercises}" var="exercise">
                    <p>
                        - ID: #{exercise.id} | #{exercise.name}
                        (#{exercise.sets} sets x #{exercise.reps} reps)
                    </p>
                </ui:repeat>

                <hr/>
            </article>
        </ui:repeat>
    </section>
</h:body>
</html>
